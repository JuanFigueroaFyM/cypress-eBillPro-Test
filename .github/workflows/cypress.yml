name: Pruebas E2E — eBill Pro Auth

on:
  push:
    branches: [main]           # Corre en cada push a main
  pull_request:
    branches: [main]           # Corre en cada PR hacia main
  workflow_dispatch:           # Permite lanzarlo manualmente desde GitHub

jobs:
  cypress-run:
    name: Cypress E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Correr pruebas y grabar en Cypress Cloud
        uses: cypress-io/github-action@v6
        with:
          record: true
          browser: chrome
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_USERNAME: ${{ secrets.CYPRESS_USERNAME }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir reporte HTML como artefacto
        uses: actions/upload-artifact@v4
        if: always()           # Subir incluso si los tests fallaron
        with:
          name: reporte-cypress-${{ github.run_number }}
          path: cypress/reports/
          retention-days: 30